<!DOCTYPE html>
<html>

<head>

<title>African Gold Wheel Simulator</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
margin-top:20px;
}

button{
padding:12px 25px;
font-size:18px;
margin-top:10px;
cursor:pointer;
background:gold;
border:none;
}

#history{
max-height:120px;
overflow:auto;
border:1px solid #444;
margin-top:10px;
padding:5px;
}

.statbox{
margin-top:15px;
}

</style>

</head>

<body>

<h1>African Gold Wheel Simulator</h1>

BET

<br>

<input id="bet" type="number" value="1" min="1">

<br>

<button onclick="spin()">SPIN</button>

<button onclick="runSimulation()">Run 10,000 Spin Test</button>

<canvas id="wheel" width="500" height="500"></canvas>

<h2 id="result"></h2>

<div class="statbox">

Total Spins:
<span id="spins">0</span>

<br>

Total Profit:
<span id="profit">0</span>

</div>

<h3>Spin History</h3>

<div id="history"></div>

<h3>Probability Tracker</h3>

<div id="prob"></div>

<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>

const segments=[
2.5,2.5,2.5,2.5,2.5,2.5,
4,4,4,4,4,
4.8,4.8,4.8,4.8,
12,12,12,
24,24,
48,
300,
1500
];

const colors=[
"#f4d03f","#f5b041","#af7ac5","#48c9b0",
"#5dade2","#ec7063","#58d68d","#f7dc6f"
];

let wheel=document.getElementById("wheel");
let ctx=wheel.getContext("2d");

let startAngle=0;

let spins=0;
let profit=0;

let history=[];

let counts={};

segments.forEach(x=>counts[x]=0);

function drawWheel(){

let arc=2*Math.PI/segments.length;

for(let i=0;i<segments.length;i++){

let angle=startAngle+i*arc;

ctx.beginPath();
ctx.fillStyle=colors[i%colors.length];

ctx.moveTo(250,250);
ctx.arc(250,250,250,angle,angle+arc);

ctx.fill();

ctx.save();

ctx.translate(250,250);
ctx.rotate(angle+arc/2);

ctx.fillStyle="black";

ctx.fillText("x"+segments[i],150,0);

ctx.restore();

}

}

function drawPointer(){

ctx.fillStyle="red";

ctx.beginPath();

ctx.moveTo(250,0);
ctx.lineTo(230,40);
ctx.lineTo(270,40);

ctx.fill();

}

function render(){

ctx.clearRect(0,0,500,500);

drawWheel();

drawPointer();

}

render();

function spin(){

document.getElementById("spinSound").play();

let bet=parseFloat(document.getElementById("bet").value);

let spinAngle=Math.random()*360+720;

let duration=2000;

let start=null;

function animate(timestamp){

if(!start) start=timestamp;

let progress=timestamp-start;

let rotation=spinAngle*(progress/duration);

startAngle=rotation*Math.PI/180;

render();

if(progress<duration){

requestAnimationFrame(animate);

}else{

finishSpin(bet);

}

}

requestAnimationFrame(animate);

}

function finishSpin(bet){

let index=Math.floor(Math.random()*segments.length);

let multiplier=segments[index];

counts[multiplier]++;

let win=bet*multiplier;

profit+=win-bet;

spins++;

history.unshift(multiplier);

if(history.length>20) history.pop();

document.getElementById("result").innerText="Multiplier x"+multiplier+" | Win: "+win;

document.getElementById("spins").innerText=spins;

document.getElementById("profit").innerText=profit.toFixed(2);

updateHistory();

updateProb();

}

function updateHistory(){

document.getElementById("history").innerHTML=

history.map(x=>"x"+x).join(" | ");

}

function updateProb(){

let txt="";

for(let k in counts){

let p=(counts[k]/spins*100)||0;

txt+="x"+k+" → "+p.toFixed(2)+"%<br>";

}

document.getElementById("prob").innerHTML=txt;

}

function runSimulation(){

for(let i=0;i<10000;i++){

finishSpin(1);

}

}

</script>

</body>

</html>
