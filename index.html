<!DOCTYPE html>
<html>
<head>
<title>African Gold Simulator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:15px;
font-size:18px;
margin-top:20px;
cursor:pointer;
}

#result{
font-size:30px;
margin-top:30px;
color:gold;
}

</style>
</head>

<body>

<h1>African Gold Wheel Simulator</h1>

<p>Multipliers: 2.5 , 4 , 4.8 , 12 , 24 , 48 , 300 , 1500</p>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>

const wheel=[
2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,2.5,
4,4,4,4,4,4,4,4,4,4,
4.8,4.8,4.8,4.8,4.8,4.8,4.8,4.8,
12,12,12,12,12,
24,24,24,
48,48,
300,
1500
];

function spin(){

let result=wheel[Math.floor(Math.random()*wheel.length)];

document.getElementById("result").innerText="Result: x"+result;

}

</script>

</body>
</html>
