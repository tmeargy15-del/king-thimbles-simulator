<!DOCTYPE html>
<html>

<head>

<title>Advanced African Gold Simulator</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:gold;
}

canvas{
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
background:gold;
border:none;
cursor:pointer;
}

.panel{
margin-top:15px;
}

#history{
max-height:120px;
overflow:auto;
border:1px solid #555;
padding:5px;
}

</style>

</head>

<body>

<h1>African Gold Probability Simulator</h1>

BET

<br>

<input id="bet" type="number" value="1">

<br>

<button onclick="spin()">SPIN</button>

<button onclick="simulate()">10,000 Spins</button>

<button onclick="exportData()">Export Results</button>

<canvas id="wheel" width="500" height="500"></canvas>

<h2 id="result"></h2>

<div class="panel">

Total Spins:
<span id="spins">0</span>

<br>

Total Profit:
<span id="profit">0</span>

<br>

RTP:
<span id="rtp">0%</span>

</div>

<h3>Spin History</h3>

<div id="history"></div>

<h3>Probability Tracker</h3>

<div id="prob"></div>

<script>

const segments=[
2.5,2.5,2.5,2.5,2.5,2.5,
4,4,4,4,4,
4.8,4.8,4.8,4.8,
12,12,12,
24,24,
48,
300,
1500
];

let wheel=document.getElementById("wheel");
let ctx=wheel.getContext("2d");

let angle=0;

let spins=0;
let profit=0;
let totalBet=0;
let totalWin=0;

let history=[];
let counts={};

segments.forEach(x=>counts[x]=0);

function drawWheel(){

let arc=2*Math.PI/segments.length;

for(let i=0;i<segments.length;i++){

let a=angle+i*arc;

ctx.beginPath();

ctx.fillStyle=`hsl(${i*20},80%,50%)`;

ctx.moveTo(250,250);

ctx.arc(250,250,250,a,a+arc);

ctx.fill();

ctx.save();

ctx.translate(250,250);

ctx.rotate(a+arc/2);

ctx.fillStyle="black";

ctx.fillText("x"+segments[i],150,0);

ctx.restore();

}

}

function pointer(){

ctx.fillStyle="red";

ctx.beginPath();

ctx.moveTo(250,0);
ctx.lineTo(235,40);
ctx.lineTo(265,40);

ctx.fill();

}

function render(){

ctx.clearRect(0,0,500,500);

drawWheel();

pointer();

}

render();

function spin(){

let bet=parseFloat(document.getElementById("bet").value);

let spinAngle=Math.random()*360+720;

let duration=2000;

let start=null;

function animate(t){

if(!start) start=t;

let progress=t-start;

angle=spinAngle*(progress/duration)*Math.PI/180;

render();

if(progress<duration){

requestAnimationFrame(animate);

}else{

finish(bet);

}

}

requestAnimationFrame(animate);

}

function finish(bet){

let index=Math.floor(Math.random()*segments.length);

let mult=segments[index];

counts[mult]++;

spins++;

totalBet+=bet;

let win=bet*mult;

totalWin+=win;

profit+=win-bet;

history.unshift(mult);

if(history.length>30) history.pop();

document.getElementById("result").innerText="Result x"+mult+" | Win "+win;

document.getElementById("spins").innerText=spins;

document.getElementById("profit").innerText=profit.toFixed(2);

document.getElementById("rtp").innerText=((totalWin/totalBet)*100).toFixed(2)+"%";

updateHistory();

updateProb();

}

function updateHistory(){

document.getElementById("history").innerHTML=

history.map(x=>"x"+x).join(" | ");

}

function updateProb(){

let txt="";

for(let k in counts){

let p=(counts[k]/spins*100)||0;

txt+="x"+k+" → "+p.toFixed(2)+"%<br>";

}

document.getElementById("prob").innerHTML=txt;

}

function simulate(){

for(let i=0;i<10000;i++){

finish(1);

}

}

function exportData(){

let data="Multiplier,Count\n";

for(let k in counts){

data+=k+","+counts[k]+"\n";

}

let blob=new Blob([data]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="simulation.csv";

a.click();

}

</script>

</body>

</html>
